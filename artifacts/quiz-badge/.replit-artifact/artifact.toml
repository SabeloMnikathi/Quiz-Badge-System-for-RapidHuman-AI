kind = "web"
previewPath = "/"
title = "Quiz Badge System"
version = "1.0.0"
id = "artifacts/quiz-badge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19333

[services.development]
run = "pnpm --filter @workspace/quiz-badge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quiz-badge", "run", "build" ]
publicDir = "artifacts/quiz-badge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19333"
BASE_PATH = "/"
